<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="CheCu - App de agendamiento de tareas para equipos">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CheCu">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>CheCu</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- ── CheCu auto-update: Service Worker monitoring ────────────────────────
       Detects when Flutter's generated service worker has a new version ready
       in the "waiting" state (i.e., a new deploy was completed) and exposes:
         window.__checu_sw_update_waiting  — boolean flag polled by Dart
         window.__checu_activate_update()  — called when user taps "Actualizar"

       How it works:
         1. Intercepts navigator.serviceWorker.register() to watch every SW.
         2. When the new SW reaches state "installed" AND there is already an
            active controller (= this is an update, not a first install), the
            flag is set to true.
         3. On tab visibility-change the active registration is asked to check
            for updates, so users returning to a background tab get the banner
            promptly without waiting for the next 5-minute timer tick.
         4. __checu_activate_update() sends the 'skipWaiting' message that
            Flutter's generated SW already handles, then reloads once the new
            SW signals controllerchange. A 3 s fallback reload guards against
            browsers that don't fire the event in time.

       This script runs before flutter_bootstrap.js so the register() patch is
       in place before Flutter registers its own service worker.
  ──────────────────────────────────────────────────────────────────────── -->
  <script>
    (function () {
      'use strict';

      window.__checu_sw_update_waiting = false;

      if (!('serviceWorker' in navigator)) {
        // SW not supported — activate simply reloads.
        window.__checu_activate_update = function () { window.location.reload(); };
        return;
      }

      // Watch a single SW registration for new versions.
      function watchReg(reg) {
        function onInstalling(worker) {
          worker.addEventListener('statechange', function () {
            if (worker.state === 'installed' && navigator.serviceWorker.controller) {
              window.__checu_sw_update_waiting = true;
            }
          });
        }
        if (reg.installing) onInstalling(reg.installing);
        reg.addEventListener('updatefound', function () {
          if (reg.installing) onInstalling(reg.installing);
        });
        // Already waiting from a previous page load?
        if (reg.waiting && navigator.serviceWorker.controller) {
          window.__checu_sw_update_waiting = true;
        }
      }

      // Patch register() so we catch Flutter's SW registration even though it
      // happens asynchronously inside flutter_bootstrap.js.
      var _origRegister = navigator.serviceWorker.register.bind(navigator.serviceWorker);
      navigator.serviceWorker.register = function (url, opts) {
        return _origRegister(url, opts).then(function (reg) {
          // Watch only Flutter's own SW; ignore the FCM SW (different scope).
          if (typeof url === 'string' && url.indexOf('flutter_service_worker') !== -1) {
            watchReg(reg);
          }
          return reg;
        });
      };

      // Also check any SWs already registered (e.g., hard-refresh scenario).
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (reg) {
          if (reg.scope && reg.scope.indexOf('firebase-cloud-messaging-push-scope') === -1) {
            watchReg(reg);
          }
        });
      });

      // Force an update check whenever the user returns to this tab.
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) return;
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (reg) {
            if (reg.scope && reg.scope.indexOf('firebase-cloud-messaging-push-scope') === -1) {
              reg.update().catch(function () {});
            }
          });
        });
      });

      // Called by Dart when the user taps "Actualizar ahora".
      window.__checu_activate_update = function () {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          var foundWaiting = false;
          regs.forEach(function (reg) {
            // Same FCM-scope exclusion as watchReg()/visibilitychange above —
            // only Flutter's own SW should ever receive 'skipWaiting'.
            if (reg.scope && reg.scope.indexOf('firebase-cloud-messaging-push-scope') !== -1) {
              return;
            }
            if (reg.waiting) {
              // Flutter's generated SW handles the string 'skipWaiting'.
              reg.waiting.postMessage('skipWaiting');
              foundWaiting = true;
            }
          });
          if (foundWaiting) {
            var done = false;
            navigator.serviceWorker.addEventListener('controllerchange', function () {
              if (!done) { done = true; window.location.reload(); }
            }, { once: true });
            // Fallback: reload even if controllerchange never fires.
            setTimeout(function () { if (!done) { done = true; window.location.reload(); } }, 3000);
          } else {
            window.location.reload();
          }
        }).catch(function () { window.location.reload(); });
      };
    })();
  </script>

  <!-- ── CheCu: let native browser zoom (Ctrl + mouse wheel) through ─────────
       Flutter Web's engine attaches its own 'wheel' listener to the glass
       pane (the element it renders into) and calls preventDefault() on every
       wheel event, including Ctrl+wheel — which is exactly the gesture
       Chrome/Edge/Firefox use for zooming the page in/out. Without this,
       users can't Ctrl+scroll to zoom CheCu to 90%/110%/etc; Ctrl+Plus/Minus
       still work regardless (browsers reserve those shortcuts and no page
       can intercept them), only the mouse-wheel variant is affected.

       Fix: a capture-phase listener on `window` runs before any listener
       Flutter attaches deeper in the DOM (capture always goes
       outermost-ancestor → target, regardless of registration order), so
       calling stopImmediatePropagation() here stops the event from ever
       reaching Flutter's handler. Since neither listener then calls
       preventDefault(), the browser's native zoom handling proceeds as
       normal. `passive: true` is safe — it only blocks preventDefault(),
       which this listener never calls. -->
  <script>
    window.addEventListener('wheel', function (event) {
      if (event.ctrlKey) {
        event.stopImmediatePropagation();
      }
    }, { capture: true, passive: true });
  </script>

  <!-- Register FCM Service Worker at Firebase's default push scope so that
       background push events are handled independently of Flutter's own SW
       lifecycle (which self-unregisters on activate). The scope must match
       the one the Firebase JS SDK uses internally when creating the push
       subscription via getToken(), so both sides agree on which registration
       owns the subscription. -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker
        .register('/firebase-messaging-sw.js', {scope: '/firebase-cloud-messaging-push-scope'})
        .then(function(reg) {
          console.log('[WEB_FCM] SW registered — scope:', reg.scope);
        })
        .catch(function(err) {
          console.error('[WEB_FCM] SW registration FAILED:', err);
        });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
