<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="CheCu - App de agendamiento de tareas para equipos">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CheCu">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>CheCu</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Register FCM Service Worker at Firebase's default push scope so that
       background push events are handled independently of Flutter's own SW
       lifecycle (which self-unregisters on activate). The scope must match
       the one the Firebase JS SDK uses internally when creating the push
       subscription via getToken(), so both sides agree on which registration
       owns the subscription. -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker
        .register('/firebase-messaging-sw.js', {scope: '/firebase-cloud-messaging-push-scope'})
        .then(function(reg) {
          console.log('[WEB_FCM] SW registered — scope:', reg.scope);
        })
        .catch(function(err) {
          console.error('[WEB_FCM] SW registration FAILED:', err);
        });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
